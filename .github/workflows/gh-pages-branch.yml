# Fallback deploy: publishes dist/ to a `gh-pages` branch.
#
# Use this if Pages is configured as "Deploy from a branch" (the legacy mode).
# If you're using "Source: GitHub Actions" on the Pages settings page, the
# `pages.yml` workflow handles deployment instead and this one is harmless.
#
# To activate: in repo Settings → Pages, set Source to
# "Deploy from a branch" → branch: `gh-pages`, folder: `/ (root)`.

name: Deploy to gh-pages branch (fallback)

on:
  workflow_dispatch:
  push:
    branches: ["main"]

permissions:
  contents: write

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - run: npm ci
      - run: npm test
      - run: npm run build
      - name: Publish dist/ to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages
          force_orphan: true
